<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#05070D">
    <meta name="description" content="Konecta Partner - Painel administrativo">
    <link rel="manifest" href="manifest.json?v=12">
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    
    <title>Konecta Partner - ADM</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css?v=18">
    <style>
        .admin-hero {
            background: linear-gradient(135deg, rgba(230, 179, 90, 0.16), rgba(26, 31, 43, 0.96));
            border: 1px solid rgba(230, 179, 90, 0.28);
            border-radius: 6px;
            padding: 14px 16px;
            margin-bottom: 14px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 14px;
        }
        .admin-kicker {
            display: block;
            color: #E6B35A;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .admin-hero h1 {
            font-size: 22px;
            line-height: 1.05;
            margin: 0 0 5px;
        }
        .admin-hero p {
            color: #B4BAC8;
            font-size: 12px;
            line-height: 1.35;
            max-width: 310px;
            margin: 0;
        }
        .admin-actions {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 8px;
            margin-bottom: 14px;
        }
        .admin-action {
            appearance: none;
            background: #1A1F2B;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            color: #F5F6FA;
            padding: 12px 10px;
            text-align: left;
            cursor: pointer;
            font-family: inherit;
            min-height: 56px;
        }
        .admin-action strong {
            display: block;
            font-size: 12px;
            margin-bottom: 3px;
        }
        .admin-action span {
            display: block;
            color: #7D8494;
            font-size: 10px;
            line-height: 1.2;
        }
        .admin-action:hover {
            border-color: rgba(230, 179, 90, 0.36);
            background: #232938;
        }
        @media (max-width: 400px) {
            .admin-hero {
                display: block;
            }
            .admin-hero .btn {
                width: 100%;
                margin-top: 12px;
            }
            .admin-actions {
                grid-template-columns: repeat(4, minmax(0, 1fr));
            }
        }
    </style>
    
    <!-- Google Fonts - tipografia limpa e forte -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- ===== LOADING ===== -->
    <div id="loading" class="loading-overlay">
        <div class="loading-spinner">
            <span class="loading-k">K</span>
        </div>
    </div>

    <!-- ===== CONTAINER PRINCIPAL ===== -->
    <div id="app" class="app-container">
        
        <!-- ===== HEADER ===== -->
        <header class="app-header">
            <div class="header-content">
                <div class="logo-area">
                    <div class="logo-icon">K</div>
                    <div class="logo-text">
                        <span class="logo-title">KONECTA</span>
                        <span class="logo-subtitle">PARTNER</span>
                    </div>
                </div>
                <div class="header-actions">
                    <button id="btnBack" class="btn-back" style="display:none;" aria-label="Voltar">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 12H5M12 19l-7-7 7-7"/>
                        </svg>
                    </button>
                    <button id="btnRefresh" class="btn-icon" aria-label="Atualizar">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M23 4v6h-6M1 20v-6h6"/>
                            <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- ===== CONTEÚDO DINÂMICO ===== -->
        <main id="mainContent" class="main-content">
            <!-- Renderizado via JavaScript -->
        </main>

        <!-- ===== FOOTER ===== -->
        <footer class="app-footer">
            <p>&copy; 2026 Konecta - Todos os direitos reservados</p>
        </footer>
    </div>

    <!-- ===== MODAL ===== -->
    <div id="modalOverlay" class="modal-overlay" style="display:none;">
        <div class="modal-container">
            <div class="modal-header">
                <h3 id="modalTitle">Título</h3>
                <button id="modalClose" class="modal-close">&times;</button>
            </div>
            <div id="modalBody" class="modal-body">
                <!-- Conteúdo dinâmico -->
            </div>
        </div>
    </div>

    <!-- ===== SCRIPTS ===== -->
    <script>
        window.KONECTA_MODE = 'admin';
    </script>
    <script src="js/utils.js?v=13"></script>
    <script src="js/matrix.js?v=20"></script>
    <script src="js/clients.js?v=13"></script>
    <script src="js/proposals.js?v=13"></script>
    <script src="js/materials.js?v=13"></script>
    <script src="js/checklist.js?v=13"></script>
    <script src="js/franchisee.js?v=13"></script>
    <script src="js/app.js?v=22"></script>
</body>
</html>
